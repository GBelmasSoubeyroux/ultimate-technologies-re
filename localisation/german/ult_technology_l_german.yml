  ULT_DARK_ENERGY_BEAM_L_DESC:0 "Bahnbrechende Forschungsergebnisse zeigen, dass dunkle Energie herkömmliche Abschirmungssysteme kurzschließen kann. Und mit dieser unglaublich dichten Explosion dunkler Energie kann theoretisch kein Schild halten."
  ULT_MATRIX_DEFENCE_ENERGY_L:0 "Energiematrix-Verteidigung Leicht"
  ULT_MATRIX_DEFENCE_ENERGY_L_DESC:0 "Vernetzte KI kombiniert mit Präzisionswaffen, um Schiffe und Raketen auszuschalten, lange bevor sie das Schiff erreichen. Diese Verteidigung ist in der Galaxie unübertroffen."
  ULT_MATRIX_DEFENCE_KINETIC_L:0 "Kinetische Matrix-Verteidigung Leicht"
  ULT_MATRIX_DEFENCE_KINETIC_L_DESC:0 "Vernetzte KI kombiniert mit Präzisionswaffen, um Schiffe und Raketen auszuschalten, lange bevor sie das Schiff erreichen. Diese Verteidigung ist in der Galaxie unübertroffen."
  ULT_PHASE_SHIELD_L:0 "Phasenschutzschild Leicht"
  ULT_PHASE_SHIELD_L_DESC:0 "Der Raum wird in komplexe Formen gebogen, die sich perfekt an die natürliche Form des Deflektors anpassen. Die besten Waffen in unserem Arsenal sind gegen diesen Schild nutzlos. Darüber hinaus kann der Phasenschild auch den umgebenden Raum in größerem Umfang verformen, um die Flugbahn feindlichen Feuers abzulenken."
  SMALL_ULT_PHASE_SHIELD_L:0 "Kleiner Phasenschild Leicht"
  MEDIUM_ULT_PHASE_SHIELD_L:0 "Mittlerer Phasenschild Leicht"
  LARGE_ULT_PHASE_SHIELD_L:0 "Großer Phasenschild Leicht"
  ULT_VIRTUAL_PARTICLE_CANNON_L:0 "Virtuelle Partikelkanone Leicht"
  ULT_VIRTUAL_PARTICLE_CANNON_L_DESC:0 "Virtuelle Partikel verhalten sich so, wie es andere Partikel nicht können. Daher sind Schutzschilde und Rüstungen, die unsere früheren Waffen aufhalten konnten, gegen sie unwirksam."
  SMALL_ULT_VIRTUAL_PARTICLE_CANNON_L:0 "Kleine virtuelle Partikelkanone Leicht"
  MEDIUM_ULT_VIRTUAL_PARTICLE_CANNON_L:0 "Mittlere virtuelle Partikelkanone Leicht"
  LARGE_ULT_VIRTUAL_PARTICLE_CANNON_L:0 "Große virtuelle Teilchenkanone Leicht"
  ULT_PHASE_RAILGUN_L:0 "Phasen-Railgun Leicht"
  ULT_PHASE_RAILGUN_L_DESC:0 "Die Phasentechnologie kann Objekte auf FTL-Geschwindigkeit beschleunigen. Diese Geschosse sind unübertroffen in ihrer Zerstörungskraft."
  SMALL_ULT_PHASE_RAILGUN_L:0 "Kleine Phasen-Railgun Leicht"
  MEDIUM_ULT_PHASE_RAILGUN_L:0 "Mittlere Phasen-Railgun Leicht"
  LARGE_ULT_PHASE_RAILGUN_L:0 "Großes Phasen-Railgun Leicht"
  ULT_SINGULARITY_ACCELERATOR_L:0 "Singularitätsbeschleuniger Leicht"
  ULT_SINGULARITY_ACCELERATOR_L_DESC:0 "Wenn man genug Energie auf einen einzigen Punkt konzentriert, entsteht ein kugelblitzförmiges schwarzes Loch. Es ist in der Lage, unsagbare Verwüstungen anzurichten."
  ULT_VOID_PHASE_MISSILE_ENERGY_L:0 "Energie Inanis Phase Missiles Leicht"
  ULT_VOID_PHASE_MISSILE_ENERGY_L_DESC:0 "Diese Raketen können die Dimensionen von Objekten um sie herum verzerren und sie "schneiden", ohne die Bindungen, die sie halten, direkt zu berühren."
  ULT_VOID_PHASE_MISSILE_KINETIC_L:0 "Kinetische Inanis-Phasen-Raketen Leicht"
  ULT_VOID_PHASE_MISSILE_KINETIC_L_DESC:0 "Diese Raketen können die Dimensionen von Objekten um sie herum verzerren und sie "schneiden", ohne die Bindungen, die sie halten, direkt zu berühren."
  ULT_GLUON_PHASE_TORPEDOE_L:0 "Gluon Phase Torpedo Leicht"
  ULT_GLUON_PHASE_TORPEDOE_L_DESC:0 "Diese Torpedos explodieren mit so verheerender Kraft, dass sie Protonen und Neutronen zum Zerfall bringen können."
  ULT_DARK_ENERGY_PHASE_TORPEDO_L:0 "Dunkle Energie Torpedo Leicht"
  ULT_DARK_ENERGY_PHASE_TORPEDO_L_DESC:0 "Durch die Verwendung von Phasenverschiebungstorpedos, die mit einem Sprengkopf aus dunkler Energie geladen sind, können wir den Schildschutz umgehen und direkt zerstörerische dunkle Energie auf die Hüllenstruktur freisetzen."
  ULT_STAR_KILLER_ENERGY_L:0 "Energie-Finsterer-Sprengkopf Leicht"
  ULT_STAR_KILLER_ENERGY_L_DESC:0 "Auch Sternenkiller genannt, die gefährlichste Waffe in unserem Arsenal. Der Energiesprengkopf enthält unvorstellbare Energie, ein einziger direkter Treffer könnte einen Stern zum Leuchten bringen."
  ULT_STAR_KILLER_KINETIC_L:0 "Kinetischer Finsterer-Sprengkopf Leicht"
  ULT_STAR_KILLER_KINETIC_L_DESC:0 "Auch Sternenkiller genannt, die gefährlichste Waffe in unserem Arsenal. Der Sprengkopf selbst ist ein Phasenverschiebungsgerät, das in der Lage ist, in der Leere zu beschleunigen und dann mit unermesslicher kinetischer Kraft aufzutauchen."
  ULT_NETWORKED_DRONES_HANGAR_ENERGY_L:0 "Energievernetzte Streikdrohnen Leicht"
  ULT_NETWORKED_DRONES_HANGAR_ENERGY_L_DESC:0 "Vernetzte Drohnen tauschen Informationen aus und formulieren Angriffsstrategien in Echtzeit, die wie ein Sturm durch die Verteidigungslinien brechen."
  ULT_NETWORKED_DRONES_HANGAR_KINETIC_L:0 "Kinetische vernetzte Streikdrohnen Leicht"
  ULT_NETWORKED_DRONES_HANGAR_KINETIC_L_DESC:0 "Vernetzte Drohnen tauschen Informationen aus und formulieren Angriffsstrategien in Echtzeit, die wie ein Sturm durch die Verteidigungslinien brechen."
  ULT_TRIDENT_TITAN_ENERGY_L:0 "Energie-Dreizack Leicht"
  ULT_TRIDENT_TITAN_ENERGY_L_DESC:0 "Wenn die Sterne vom Himmel fallen, existiert die Zeit nicht mehr. Der verdunkelte Boden bebt und versinkt in der aufgewühlten See. Es gibt nur eine monströse Welle, die ihn berührt. Es gibt nur eine Stille der Stille und ewige Dunkelheit im Universum.  <Ragnarok> "
  ULT_TRIDENT_TITAN_KINETIC_L:0 "Kinetischer Dreizack von Titan Leicht"
  ULT_TRIDENT_TITAN_KINETIC_L_DESC:0 "Wenn die Sterne vom Himmel fallen, existiert die Zeit nicht mehr. Der verdunkelte Boden bebt und versinkt in der aufgewühlten See. Es gibt nur eine monströse Welle, die ihn berührt. Es gibt nur eine Stille der Stille und ewige Dunkelheit im Universum.  -- <Ragnarok> "
  ULT_TRIDENT_ION_ENERGY_L:0 "Energie-Dreizack des Wächters Leicht"
  ULT_TRIDENT_ION_ENERGY_L_DESC:0 "Der Dreizack des Wächters ist viel mächtiger als der des Titanen. Allerdings kann er nur auf der unbeweglichen Ionenkanone installiert werden."
  ULT_TRIDENT_ION_KINETIC_L:0 "Kinetischer Dreizack des Wächters Leicht"
  ULT_TRIDENT_ION_KINETIC_L_DESC:0 "Der Dreizack des Wächters ist viel mächtiger als der des Titans. Aber er hat seinen Preis: Er kann nur auf der unbeweglichen Ionenkanone installiert werden.
  ULT_GLUON_CANNON_L:0 "Gluon-Splitterkanone Leicht"
  ULT_GLUON_CANNON_L_DESC:0 "Die Gluonenkanone nutzt die starke Kraft, um ihre Ziele zu zerfetzen. Je höher sie beschleunigt wird, desto höher ist ihre Zerstörungskraft, selbst die Neutronium-Panzerung wird unter der Belastung versagen."
  ULT_TRANSPHASIC_PLUSE_L:0 "Thansphasic Pluse Leicht"
  ULT_TRANSPHASIC_PLUSE_L_DESC:0 "Der transphasische Impuls erzeugt Subraumverzerrungen, die Materialien in höheren Dimensionen zerreißen."
  SMALL_ULT_TRANSPHASIC_PLUSE_L:0 "Kleiner transphasischer Pluse Leicht"
  MEDIUM_ULT_TRANSPHASIC_PLUSE_L:0 "Mittlere Thansphasische Pluse Leicht"
  LARGE_ULT_TRANSPHASIC_PLUSE_L:0 "Große Thansphasische Pluse Leicht"
  ULT_VIRTUAL_PARTICLE_TORRENT_L:0 "Virtueller Partikel-Torrent Leicht"
  ULT_VIRTUAL_PARTICLE_TORRENT_L_DESC:0 "Diese beschleunigten Hochgeschwindigkeitsströme virtueller Teilchen können einen kleinen Bereich räumlicher Verzerrungen erzeugen, die sogar gegen physikalische Gesetze verstoßen."
  
  SWARM_ULT_COMBAT_COMPUTER_AI_L:0 "Vernetztes KI-Terminal Leicht(Schwarm)"
  SWARM_ULT_COMBAT_COMPUTER_AI_L_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht so eine Flottenkoordination in noch nie dagewesenem Ausmaß und einzelne Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  PICKET_ULT_COMBAT_COMPUTER_AI_L:0 "Vernetzter KI-Terminal Leicht(Streikposten)"
  PICKET_ULT_COMBAT_COMPUTER_AI_L_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht so eine Flottenkoordination in noch nie dagewesenem Ausmaß und einzelne Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
