  zone_ult_research_unity:0 "Utopische Akademie"
  zone_ult_research_unity_desc:0 "Wissen fließt frei durch unsere Bildungs‑ und Trainingszentren. KI‑gestützte Lehre und Holo‑Simulationslabore formen die nächste Generation von Experten in Wissenschaft, Industrie und Verwaltung. Bürger aller Hintergründe erhalten Zugang zu unvergleichlicher geistiger Bereicherung."
  zone_ult_research_unity_ecu:0 "Utopische Akademie"
  zone_ult_research_unity_ecu_desc:0 "Wissen fließt frei durch unsere Bildungs‑ und Trainingszentren. KI‑gestützte Lehre und Holo‑Simulationslabore formen die nächste Generation von Experten in Wissenschaft, Industrie und Verwaltung. Bürger aller Hintergründe erhalten Zugang zu unvergleichlicher geistiger Bereicherung."
