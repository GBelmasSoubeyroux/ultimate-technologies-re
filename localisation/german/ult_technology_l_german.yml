  TITAN_ULT_VP_PULSE_THRUSTER:0 "Virtuelles Partikel-Triebwerk"
  TITAN_ULT_VP_PULSE_THRUSTER_DESC:0 "Der Ursprung der Kräfte, die in diesem Antrieb erzeugt werden, ist noch nicht geklärt. Nichtsdestotrotz sind sie deutlich schneller und effizienter als herkömmliche Sublichttriebwerke."
  COLOSSUS_ULT_VP_PULSE_THRUSTER:0 "Virtuelles Partikel-Triebwerk"
  COLOSSUS_ULT_VP_PULSE_THRUSTER_DESC:0 "Der Ursprung der in diesem Triebwerk erzeugten Kräfte ist noch nicht geklärt. Nichtsdestotrotz sind sie deutlich schneller und effizienter als herkömmliche Sublicht-Triebwerke.
  ULT_REGENERATION_FIELD:0 "Nano-Regenerationsfeld"
  ULT_REGENERATION_FIELD_DESC:0 "Ein riesiges Feld von Nanobots, das das Schiff umgibt, lädt die Schilde in einem Augenblick wieder auf und repariert Schäden an der Hülle, sobald sie auftreten."
  SWARM_ULT_COMBAT_COMPUTER_AI:0 "Vernetztes KI-Terminal (Schwarm)"
  SWARM_ULT_COMBAT_COMPUTER_AI_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht eine Flottenkoordination in noch nie dagewesenem Ausmaß sowie individuelle Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  PICKET_ULT_COMBAT_COMPUTER_AI:0 "Vernetztes KI-Terminal (Vorposten)"
  PICKET_ULT_COMBAT_COMPUTER_AI_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht eine Flottenkoordination in noch nie dagewesenem Ausmaß und individuelle Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  LINE_ULT_COMBAT_COMPUTER_AI:0 "Vernetztes KI-Terminal (Linie)"
  LINE_ULT_COMBAT_COMPUTER_AI_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht eine Flottenkoordination in noch nie dagewesenem Ausmaß und individuelle Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  ARTILLERY_ULT_COMBAT_COMPUTER_AI:0 "Vernetztes KI-Terminal (Artillerie)"
  ARTILLERY_ULT_COMBAT_COMPUTER_AI_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht so eine Flottenkoordination in noch nie dagewesenem Ausmaß und einzelne Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  PLATFORM_ULT_COMBAT_COMPUTER_AI:0 "Vernetztes KI-Terminal (Plattform)"
  PLATFORM_ULT_COMBAT_COMPUTER_AI_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht eine Flottenkoordination in noch nie dagewesenem Ausmaß und individuelle Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  STARBASE_ULT_COMBAT_COMPUTER_AI:0 "Vernetztes KI-Terminal (Sternenbasis)"
  STARBASE_ULT_COMBAT_COMPUTER_AI_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht eine Flottenkoordination in noch nie dagewesenem Ausmaß und individuelle Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  ULT_PHASE_RAILGUN:0 "Phasen-Railgun"
  ULT_PHASE_RAILGUN_DESC:0 "Die Phasentechnologie kann Objekte auf FTL-Geschwindigkeit beschleunigen. Diese Geschosse sind in ihrer Zerstörungskraft unübertroffen."
  SMALL_ULT_PHASE_RAILGUN:0 "Kleine Phasen-Railgun"
  MEDIUM_ULT_PHASE_RAILGUN:0 "Mittlere Phasen-Railgun"
  LARGE_ULT_PHASE_RAILGUN:0 "Großes Phasen-Railgun"
  ULT_SINGULARITY_ACCELERATOR:0 "Singularitätsbeschleuniger"
  ULT_SINGULARITY_ACCELERATOR_DESC:0 "Wenn man genügend Energie auf einen einzigen Punkt konzentriert, entsteht ein kugelblitzförmiges Schwarzes Loch. Es ist in der Lage, unsagbare Verwüstungen anzurichten."
  ULT_VOID_PHASE_MISSILE_ENERGY:0 "Energie-Inanis-Phasen-Raketen"
  ULT_VOID_PHASE_MISSILE_ENERGY_DESC:0 "Diese Raketen können die Dimensionen von Objekten um sie herum verzerren und sie "schneiden", ohne die Verbindungen, die sie halten, direkt zu berühren."
  ULT_VOID_PHASE_MISSILE_KINETIC:0 "Kinetische Inanis-Phasen-Raketen"
  ULT_VOID_PHASE_MISSILE_KINETIC_DESC:0 "Diese Raketen können die Dimensionen von Objekten um sie herum verzerren und sie "schneiden", ohne die Bindungen, die sie halten, direkt zu berühren."
  ULT_GLUON_PHASE_TORPEDOE:0 "Gluon-Phasen-Torpedo"
  ULT_GLUON_PHASE_TORPEDOE_DESC:0 "Diese Torpedos explodieren mit solch verheerender Kraft, dass sie Protonen und Neutronen zum Zerfall bringen können."
  ULT_DARK_ENERGY_PHASE_TORPEDO:0 "Dunkler Energie-Torpedo"
  ULT_DARK_ENERGY_PHASE_TORPEDO_DESC:0 "Durch die Verwendung von phasenverschiebenden Torpedos, die mit einem Sprengkopf aus dunkler Energie geladen sind, können wir den Schildschutz umgehen und direkt zerstörerische dunkle Energie auf die Hüllenstruktur freisetzen."
  ULT_STAR_KILLER_ENERGY:0 "Finsterer-Energie-Sprengkopf"
  ULT_STAR_KILLER_ENERGY_DESC:0 "Auch Sternenkiller genannt, die gefährlichste Waffe in unserem Arsenal. Der Energiesprengkopf enthält unvorstellbare Energie, ein einziger direkter Treffer könnte einen Stern zum Leuchten bringen."
  ULT_STAR_KILLER_KINETIC:0 "Kinetischer Eclipse-Sprengkopf"
  ULT_STAR_KILLER_KINETIC_DESC:0 "Auch Sternenkiller genannt, die gefährlichste Waffe in unserem Arsenal. Der Sprengkopf selbst ist ein Phasenverschiebungsgerät, das in der Lage ist, in der Leere zu beschleunigen und dann mit unermesslicher kinetischer Kraft aufzutauchen."
  ULT_NETWORKED_DRONES_HANGAR_ENERGY:0 "Energievernetzte Schlagdrohnen"
  ULT_NETWORKED_DRONES_HANGAR_ENERGY_DESC:0 "Vernetzte Drohnen tauschen Informationen aus und formulieren Angriffsstrategien in Echtzeit, die wie ein Sturm durch die Verteidigungslinien brechen."
  ULT_NETWORKED_DRONES_HANGAR_KINETIC:0 "Kinetische vernetzte Angriffsdrohnen"
  ULT_NETWORKED_DRONES_HANGAR_KINETIC_DESC:0 "Vernetzte Drohnen tauschen Informationen aus und formulieren Angriffsstrategien in Echtzeit, die wie ein Sturm durch die Verteidigungslinien brechen."
  ULT_QUANTUM_FIRE_CONTROL:0 "Quanten-Feuerkontrolle"
  ULT_QUANTUM_FIRE_CONTROL_DESC:0 "Fortgeschrittene Quantenberechnungsmethoden können Schiffsmuster und Flugrouten mit makelloser Genauigkeit vorhersagen."
  ULT_TRIDENT_TITAN_ENERGY:0 "Energie-Dreizack des Wächters"
  ULT_TRIDENT_TITAN_ENERGY_DESC:0 "Wenn die Sterne vom Himmel fallen, existiert die Zeit nicht mehr. Der verdunkelte Boden bebt und versinkt in der aufgewühlten See. Es gibt nur eine monströse Welle, die ihn berührt. Es gibt nur eine Stille der Stille und ewige Dunkelheit im Universum.  -- <Ragnarok> "
  ULT_TRIDENT_TITAN_KINETIC:0 "Kinetischer Dreizack des Wächters"
  ULT_TRIDENT_TITAN_KINETIC_DESC:0 "Wenn die Sterne vom Himmel fallen, existiert die Zeit nicht mehr. Der verdunkelte Boden bebt und versinkt in der aufgewühlten See. Es gibt nur eine monströse Welle, die ihn berührt. Es gibt nur eine Stille der Stille und ewige Dunkelheit im Universum.  -- <Ragnarok> "
  ULT_TRIDENT_ION_ENERGY:0 "Energie-Dreizack"
  ULT_TRIDENT_ION_ENERGY_DESC:0 "Der Dreizack des Wächters ist viel mächtiger als der der Titanen. Allerdings kann er nur auf der unbeweglichen Ionenkanone installiert werden."
  ULT_TRIDENT_ION_KINETIC:0 "Kinetischer Dreizack"
  ULT_TRIDENT_ION_KINETIC_DESC:0 "Der Dreizack des Wächters ist viel mächtiger als der des Titanen. Allerdings kann er nur auf der unbeweglichen Ionenkanone installiert werden."
  ULT_GLUON_CANNON:0 "Gluon-Splitterkanone"
  ULT_GLUON_CANNON_DESC:0 "Die Gluonenkanone nutzt die starke Kraft, um ihre Ziele zu zerfetzen. Je höher sie beschleunigt wird, desto höher ist ihre Zerstörungskraft, selbst die Neutronium-Panzerung wird unter der Belastung versagen."
  ULT_TRANSPHASIC_PLUSE:0 "Thansphasische Pluse"
  ULT_TRANSPHASIC_PLUSE_DESC:0 "Der transphasische Impuls erzeugt Subraumverzerrungen, die Materialien in höheren Dimensionen zerreißen."
  SMALL_ULT_TRANSPHASIC_PLUSE:0 "Kleiner Thansphasenimpuls"
  MEDIUM_ULT_TRANSPHASIC_PLUSE:0 "Mittlerer Thansphasenimpuls"
  LARGE_ULT_TRANSPHASIC_PLUSE:0 "Große Thansphasenimpuls"
  ULT_DARK_ENERGY_BOOSTER_1:0 "Dunkle Energieverstärker - S"
  ULT_DARK_ENERGY_BOOSTER_1_DESC:0 "Dieselbe Kraft, die die Ausdehnung des Universums vorantreibt, treibt nun unsere Schiffe an. Die endlose Leere des Raums ist kein Hindernis mehr."
  ULT_DARK_ENERGY_BOOSTER_2:0 "Reaktor für dunkle Energie - M"
  ULT_DARK_ENERGY_BOOSTER_2_DESC:0 "Dieselbe Kraft, die die Expansion des Universums antreibt, treibt nun unsere Schiffe an. Die endlose Leere des Raums ist kein Hindernis mehr."
  ULT_DARK_ENERGY_BOOSTER_3:0 "Reaktor für dunkle Energie - L"
  ULT_DARK_ENERGY_BOOSTER_3_DESC:0 "Dieselbe Kraft, die die Expansion des Universums antreibt, treibt nun unsere Schiffe an. Die endlose Leere des Raums ist kein Hindernis mehr."
  ULT_DARK_ENERGY_BOOSTER_4:0 "Dunkler Energiereaktor - XL"
  ULT_DARK_ENERGY_BOOSTER_4_DESC:0 "Dieselbe Kraft, die die Expansion des Universums antreibt, treibt nun unsere Schiffe an. Die endlose Leere des Raums ist kein Hindernis mehr."
  
  
  
