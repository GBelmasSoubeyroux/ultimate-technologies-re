  district_ult_dark_energy_power_center:0 "Dunkelenergie‑Energiezentrum"
  district_ult_dark_energy_power_center_desc:0 "Dunkle Energie treibt das Universum auf kosmischer Ebene auseinander. Es gibt keine größere Energiequelle, und durch die Anwendung von Dunkelenergie‑Feldmanipulationstechnologien können wir sie nun einfach und gefahrlos zur Versorgung unseres Imperiums nutzen."
  district_ult_automatic_mining_zone:0 "Automatische Bergbauzone"
  district_ult_automatic_mining_zone_desc:0 "Diese autonomen Bergbauzonen entsenden vollautomatische Drohnen zu nahen planetaren Objekten. Dank unserer leistungsstarken atomaren Kontrolltechnologie können diese Drohnen hocheffiziente, autonome Bergbauoperationen durchführen, unabhängig von planetaren Lagerstätten, und veredelte Mineralien an ihre Basis zurücksenden."
  district_ult_nano_garden_district:0 "Nanogarten‑Bezirk"
  district_ult_nano_garden_district_desc:0 "Nanodrohnen versorgen Pflanzen in Echtzeit mit Nährstoffen und treiben ihre Wachstumsleistung an die Grenzen. Unsere Ernährungswissenschaftler können die extrem nährstoffreiche Biomasse leicht nutzen, um hochwertige Lebensmittel und Konsumgüter zu synthetisieren."
