  STARBASE_ULT_DARK_ENERGY_REACTOR:0 "Reaktor für dunkle Energie"
  STARBASE_ULT_DARK_ENERGY_REACTOR_DESC:0 "Dieselbe Kraft, die die Expansion des Universums antreibt, treibt nun unsere Schiffe an. Die endlose Leere des Raums ist kein Hindernis mehr."
  ULT_PHASE_LANCE:0 "Phasenlanze"
  ULT_PHASE_LANCE_DESC:0 "Durch die Vergrößerung des Raums und der Energie auf kollosale Größe wird eine neue Waffe geschaffen, die so zerstörerisch ist, dass kein denkbares Wesen einem direkten Treffer standhalten könnte."
  ULT_DARK_ENERGY_BEAM:0 "Dunkler Energiestrahl"
  ULT_DARK_ENERGY_BEAM_DESC:0 "Bahnbrechende Forschungsergebnisse zeigen, dass dunkle Energie herkömmliche Abschirmungssysteme kurzschließen kann. Und durch die Verwendung dieser unglaublich dichten Explosion dunkler Energie kann theoretisch kein Schild halten."
  ULT_MATRIX_DEFENCE_ENERGY:0 "Energiematrix-Verteidigung"
  ULT_MATRIX_DEFENCE_ENERGY_DESC:0 "Vernetzte KI kombiniert mit Präzisionswaffen, um Schiffe und Raketen auszuschalten, lange bevor sie das Schiff erreichen. Diese Verteidigung ist in der Galaxie unübertroffen."
  ULT_MATRIX_DEFENCE_KINETIC:0 "Kinetische Matrix-Verteidigung"
  ULT_MATRIX_DEFENCE_KINETIC_DESC:0 "Vernetzte KI kombiniert mit Präzisionswaffen, um Schiffe und Raketen auszuschalten, lange bevor sie das Schiff erreichen. Diese Verteidigung ist in der Galaxie unübertroffen."
  ULT_PHASE_SHIELD:0 "Phasenschutzschild"
  ULT_PHASE_SHIELD_DESC:0 "Der Raum wird in komplexe Formen verdreht, die sich perfekt an die natürliche Form des Deflektors anpassen. Die besten Waffen in unserem Arsenal sind gegen diesen Schild nutzlos. Darüber hinaus kann der Phasenschild auch den umgebenden Raum in größerem Umfang verformen, um die Flugbahn feindlichen Feuers abzulenken."
  SMALL_ULT_PHASE_SHIELD:0 "Kleine Phasenschild
  MEDIUM_ULT_PHASE_SHIELD:0 "Mittlere Phasenschild"
  LARGE_ULT_PHASE_SHIELD:0 "Großer Phasenschild"
  ULT_VIRTUAL_PARTICLE_CANNON:0 "Virtuelle Partikelkanone"
  ULT_VIRTUAL_PARTICLE_CANNON_DESC:0 "Virtuelle Partikel verhalten sich so, wie es andere Partikel nicht können. Infolgedessen sind Schutzschilde und Rüstungen, die unsere früheren Waffen aufhalten konnten, gegen sie unwirksam."
  SMALL_ULT_VIRTUAL_PARTICLE_CANNON:0 "Kleine virtuelle Partikelkanone"
  MEDIUM_ULT_VIRTUAL_PARTICLE_CANNON:0 "Mittlere virtuelle Partikelkanone"
  LARGE_ULT_VIRTUAL_PARTICLE_CANNON:0 "Große  virtuelle Partikelkanone"
  ULT_VIRTUAL_PARTICLE_TORRENT:0 "Virtueller Teilchensturm"
  ULT_VIRTUAL_PARTICLE_TORRENT_DESC:0 "Diese beschleunigten Hochgeschwindigkeitsströme virtueller Teilchen können einen kleinen Bereich räumlicher Verzerrungen erzeugen, die sogar gegen physikalische Gesetze verstoßen."
  ULT_VIRTUAL_PARTICLE_SENSOR:0 "Virtueller Partikel-Sensor"
  ULT_VIRTUAL_PARTICLE_SENSOR_DESC:0 "Virtuelle Teilchen übertragen Kräfte über riesige Entfernungen fast augenblicklich. Dies führt zu Erfassungsbereichen, die in älteren Systemen unbekannt sind."
  STATION_ULT_VIRTUAL_PARTICLE_SENSOR:0 "Virtueller Partikel-Sensor"
  STATION_ULT_VIRTUAL_PARTICLE_SENSOR_DESC:0 "Virtuelle Teilchen übertragen Kräfte über riesige Entfernungen fast augenblicklich. Dies führt zu Erfassungsbereichen, die in älteren Systemen unbekannt sind."
  CORVETTE_ULT_VP_PULSE_THRUSTER:0 "Virtuelles Partikel-Triebwerk"
  CORVETTE_ULT_VP_PULSE_THRUSTER_DESC:0 "Der Ursprung der in diesem Triebwerk erzeugten Kräfte ist noch nicht geklärt. Nichtsdestotrotz sind sie deutlich schneller und effizienter als herkömmliche Sublichttriebwerke."
  DESTROYER_ULT_VP_PULSE_THRUSTER:0 "Virtuelles Partikel-Triebwerk"
  DESTROYER_ULT_VP_PULSE_THRUSTER_DESC:0 "Der Ursprung der Kräfte, die in diesem Triebwerk erzeugt werden, ist noch nicht geklärt. Nichtsdestotrotz sind sie deutlich schneller und effizienter als herkömmliche Sublichttriebwerke."
