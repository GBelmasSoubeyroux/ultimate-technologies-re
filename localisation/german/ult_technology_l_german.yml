  tech_ult_dark_weaponry:0 "Dunkle Waffenkunst"
  tech_ult_dark_weaponry_desc:0 "Eines der größten Geheimnisse des Universums in eine Waffe zu verwandeln, ist keine kleine Leistung. Sie hat jedoch das Potenzial, die gesamte Existenz nach unserem Willen zu formen."
  
  
  
