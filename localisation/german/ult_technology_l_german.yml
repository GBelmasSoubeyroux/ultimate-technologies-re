  LINE_ULT_COMBAT_COMPUTER_AI_L_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht eine Flottenkoordination in noch nie dagewesenem Ausmaß und individuelle Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  ARTILLERIE_ULT_COMBAT_COMPUTER_AI_L:0 "Vernetztes KI-Terminal Leicht (Artillerie)"
  ARTILLERY_ULT_COMBAT_COMPUTER_AI_L_DESC:0 "Ein KI-Netzwerk verbindet jedes Schiff in der Flotte und ermöglicht so eine Flottenkoordination in noch nie dagewesenem Ausmaß und individuelle Schiffe, die zu Manövern fähig sind, von denen man bisher nur träumen konnte."
  
  ULT_QUANTUM_FIRE_CONTROL_L:0 "Quanten-Feuerkontrolle Leicht"
  ULT_QUANTUM_FIRE_CONTROL_L_DESC:0 "Fortgeschrittene Quantenberechnungsmethoden können Schiffsmuster und Flugbahnen mit tadelloser Genauigkeit vorhersagen."
  ULT_REGENERATION_FIELD_L:0 "Nano-Regenerationsfeld Leicht"
  ULT_REGENERATION_FIELD_L_DESC:0 "Ein riesiges Feld von Nanobots, das das Schiff umgibt, lädt die Schilde in einem Augenblick auf und repariert Schäden an der Hülle, sobald sie auftreten."
  ULT_QUANTUM_FIRE_CONTROL_U:0 "Quanten-Feuerkontrolle Null"
  ULT_QUANTUM_FIRE_CONTROL_U_DESC:0 "Fortgeschrittene Quantenberechnungsmethoden können Schiffsmuster und Flugrouten mit makelloser Genauigkeit vorhersagen."
  ULT_REGENERATION_FIELD_U:0 "Nano-Regenerationsfeld Null"
  ULT_REGENERATION_FIELD_U_DESC:0 "Ein riesiges Feld von Nanobots, das das Schiff umgibt, lädt die Schilde in einem Augenblick auf und repariert Schäden an der Hülle, sobald sie auftreten."
  ULT_VIRTUAL_PARTICLE_SENSOR_L:0 "Virtueller Partikelsensor Leicht"
  ULT_VIRTUAL_PARTICLE_SENSOR_L_DESC:0 "Virtuelle Partikel übertragen Kräfte über große Entfernungen fast augenblicklich. Dadurch ergeben sich Entdeckungsbereiche, die in älteren Systemen unbekannt sind."
  ULT_VIRTUAL_PARTICLE_SENSOR_U:0 "Virtueller Partikelsensor Null"
  ULT_VIRTUAL_PARTICLE_SENSOR_U_DESC:0 "Virtuelle Teilchen übertragen Kräfte über große Entfernungen fast augenblicklich. Dies führt zu Erfassungsbereichen, die in älteren Systemen unbekannt sind."
  
  
