  ult_planetary_defence_system_L:0 "Ultimatives planetares Verteidigungssystem"
  ult_planetary_defence_system_L_desc:0 "Ein mächtiges planetarisches Verteidigungssystem, das von Menschen oder KI kontrolliert wird, die sich in einer sicheren Festung verstecken."
  elite_ult_L:0 "Elite-Streitmacht"
  elite_ult_L_desc:0 "Die Soldaten werden nach außergewöhnlichen Kampffähigkeiten ausgewählt. Danach erhalten sie spezielle Gentherapien, um ihre Fähigkeiten zu verbessern, und eine breite Palette kybernetischer Implantate, um ihre Effektivität weiter zu steigern. In Verbindung mit einem zermürbenden Training und der modernsten verfügbaren militärischen Ausrüstung sind einzelne Einheiten dafür bekannt, ganze Armeen in die Flucht zu schlagen."
  synthetic_elite_ult_L:0 "Synthetische Elite-Streitmacht"
  synthetic_elite_ult_L_desc:0 "Fast dasselbe wie die Elite-Streitmacht, nur dass sie aus einer synthetischen Armee besteht."
  war_robot_ult_L:0 "Ultimative Kriegsmaschine"
  war_robot_ult_L_desc:0 "Eine gigantische Waffenplattform, die allein ganze Planeten überwältigen kann."
  war_machine_ult_L:0 "Ultimative Kriegsmaschine"
  war_machine_ult_L_desc:0 "Eine gigantische Waffenplattform, die ganze Planeten allein überwältigen kann."
  war_titan_ult_L:0 "Bio-Titan"
  war_titan_ult_L_desc:0 "Eine titanische Lebensform, die auf den Kampf spezialisiert und mit einer breiten Palette natürlicher und künstlicher Waffen ausgestattet ist."
  apocalypse_army_ult_L:0 "Der Avatar"
  apocalypse_army_ult_L_desc:0 "Ein Individuum, dessen angeborene psionische Kräfte weniger als eins zu zehn Milliarden betragen. Mit seiner gottgleichen Macht hat dieses Wesen selbst die hartnäckigsten Materialisten zum Glauben gebracht."
  
