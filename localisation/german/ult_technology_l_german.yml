  district_ult_utopia_arcology:0 "Utopischer Arkologiebezirk"
  district_ult_utopia_arcology_desc:0 "Utopische Arkologien vereinen unsere modernste Technologie, bieten hervorragende Raumnutzung und maximale Lebensqualität, und jeder Teil der Infrastruktur arbeitet im perfekten Zustand."
