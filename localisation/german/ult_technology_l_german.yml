  ult_utopia_infrastructure_ecu_desc:0 "Utopische Infrastrukturen bieten ein bewohnbares, voll funktionsfähiges und veränderbares planetarisches Bausystem, das es uns ermöglicht, Gebäude leicht an unsere Bedürfnisse anzupassen."
  ult_utopia_infrastructure_hab:0 "Utopische Infrastruktur"
  ult_utopia_infrastructure_hab_desc:0 "Utopische Infrastrukturen bieten ein bewohnbares, voll funktionsfähiges und veränderbares planetarisches Bausystem, das es uns ermöglicht, Gebäude leicht an unsere Bedürfnisse anzupassen."
  ult_utopia_infrastructure_rw:0 "Ringwelt‑Utopische Infrastruktur"
  ult_utopia_infrastructure_rw_desc:0 "Utopische Infrastrukturen bieten ein bewohnbares, voll funktionsfähiges und veränderbares planetarisches Bausystem, das es uns ermöglicht, Gebäude leicht an unsere Bedürfnisse anzupassen."
  ult_temporary_settlement:0 "Vorübergehende Siedlung"
  ult_temporary_settlement_desc:0 "Aufgrund großflächiger planetarer Umgestaltung stehen diese bewohnbaren provisorischen Siedlungen nun Obdachlosen offen."
  ult_architecture_optimize:0 "Optimierte Infrastruktur"
  ult_architecture_optimize_desc:0 "Durch die Anwendung hochentwickelter Architekturtechnologien zur Optimierung unserer Welt haben wir erfolgreich ein effizientes Infrastruktursystem nach Gestalt‑Art errichtet. Nun können wir die Vorteile genießen, die es mit sich bringt."
  ult_gaia_shield_activating:0 "Gaia‑Schild vollständig aktiviert"
  ult_gaia_shield_activating_desc:0 "Der vollständig aktivierte Gaia‑Schild schützt uns vor großer Gefahr. Er hält enormen orbitalen Bombardements stand und verschafft uns wertvolle Zeit, um auf den Feind zu reagieren. Allerdings kann er planetenzerstörende Waffen nicht aufhalten."
  ult_gaia_shield_recharging:0 "Gaia‑Schild lädt auf"
  ult_gaia_shield_recharging_desc:0 "Der Gaia‑Schild benötigt Zeit, um für eine weitere regenerierende Welle wieder aufzuladen."
  ult_organic_pop_assembly:0 "Organische Bevölkerungssynthese"
  ult_organic_pop_assembly_desc:0 "Nanoverstärkte Inkubatoren werden eingesetzt, um organische Pops effizient zu züchten. (Zum Starten wird möglicherweise ein Klonbehälter benötigt.)"
  ult_robot_pop_assembly:0 "Robotische Pop‑Montage"
  ult_robot_pop_assembly_desc:0 "Atomdruck und Nanotechnologie werden eingesetzt, um mechanische Teile für unsere robotischen Pops automatisch zusammenzubauen. (Zum Starten wird möglicherweise eine Roboter‑Montageanlage benötigt.)"
  col_ult_utopia:0 "Utopische Welt"
  col_ult_utopia_desc:0 "Die utopische Welt ist ein wahres Paradies, in dem zahlreiche Spezies koexistieren und gedeihen können. Die Bewohner genießen eine hohe Lebensqualität und unermessliche Freude."
  col_ult_utopia_trade:0 "Utopische Welt (Handelsfokus)"
  col_ult_utopia_trade_desc:0 "Die utopische Welt ist ein wahres Paradies, in dem zahlreiche Spezies koexistieren und gedeihen können. Die Bewohner genießen eine hohe Lebensqualität und unermessliche Freude."
