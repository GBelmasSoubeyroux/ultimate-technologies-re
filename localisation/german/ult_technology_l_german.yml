  STARBASE_AURA_ULT_MATRIX_DEFENCE:0 "Systembefestigungsfeld"
  STARBASE_AURA_ULT_MATRIX_DEFENCE_DESC:0 "Dieses von der ultimativen Verteidigungsmatrix erzeugte Raum-Zeit-Feld deckt das gesamte System ab. Es setzt gleichzeitig Harmonische mit doppelter Polarität frei, die feindliche Feuerkraft unterdrücken und befreundeten Flotten eine unglaubliche Verstärkung bieten können."
  aura_ult_matrix_defence_hostile:0 "Phasenharmonisches Feld"
  aura_ult_matrix_defence_friendly:0 "Zeitbeschleunigungsfeld"
  ULT_ETHERSTRING_DISRUPTOR:0 "Ätherschnur-Unterbrecher"
  ULT_ETHERSTRING_DISRUPTOR_DESC:0 "Der Ether-string Disruptor emittiert virtuelle Partikel in einem einzigartigen Phasenzustand, die die Raum-Zeit-Kontinuität der gegnerischen Flotte wie das Zupfen einer Saite unterbrechen."
  aura_ult_etherstring_disruptor:0 "Ätherschnur-Unterbrechungsfeld"
  SHIP_AURA_ULT_MULTIPHASE_STABILIZER:0 "Mehrphasen-Stabilisator"
  SHIP_AURA_ULT_MULTIPHASE_STABILIZER_DESC:0 "Der Multiphasen-Stabilisator kann die Wellen von Zeit und Raum in weiten Bereichen "glätten", so dass unser Schiff die Zeit und den Raum um sich herum leicht formen kann, um feindliche Feuerkraft abzulenken."
  aura_ult_multiphase_stabilizer:0 "Mehrphasen-Stabilisator"
  SHIP_AURA_ULT_TEMPORAL_FIELD:0 "Temporalfeld-Beschleuniger"
  SHIP_AURA_ULT_TEMPORAL_FIELD_DESC:0 "Mit der Phasentechnologie werden Zeit und Raum verzerrt, so dass unsere Schiffe in kurzer Zeit mehr Reaktionen durchführen können."
  aura_ult_temporal_field:0 "Temporalfeldbeschleuniger"
  SHIP_AURA_ULT_SPATIOTEMPORAL_ARRAY:0 "Quanten-Raum-Zeit-Array"
  SHIP_AURA_ULT_SPATIOTEMPORAL_ARRAY_DESC:0 "Unzählige phasengesteuerte Arrays bilden diesen riesigen Raum-Zeit-Bereich, und Schiffe in diesem Bereich können ihre Leistung maximieren."
  aura_ult_spatiotemporal_array:0 "Raumzeitlicher Quantenbereich"
  