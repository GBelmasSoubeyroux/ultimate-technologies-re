  zone_ult_research_unity_rw_desc:0 "Wissen fließt frei durch unsere Bildungs‑ und Trainingszentren. KI‑gestützte Lehre und Holo‑Simulationslabore formen die nächste Generation von Experten in Wissenschaft, Industrie und Verwaltung. Bürger aller Hintergründe erhalten Zugang zu unvergleichlicher geistiger Bereicherung."
  zone_ult_research:0 "Utopische Forschung"
  zone_ult_research_desc:0 "Unsere Forschungseinrichtungen nutzen physikalische Gesetzmäßigkeiten und atomare Präzision, um die Grenzen der Wissenschaft zu erweitern. Labore, Orbitalobservatorien und Quantenrechner‑Arrays arbeiten nahtlos zusammen und erzeugen Durchbrüche in Physik, Biologie und Ingenieurwesen."
  zone_ult_research_ecu:0 "Utopische Forschung"
  zone_ult_research_ecu_desc:0 "Unsere Forschungseinrichtungen nutzen physikalische Gesetzmäßigkeiten und atomare Präzision, um die Grenzen der Wissenschaft zu erweitern. Labore, Orbitalobservatorien und Quantenrechner‑Arrays arbeiten nahtlos zusammen und erzeugen Durchbrüche in Physik, Biologie und Ingenieurwesen."
