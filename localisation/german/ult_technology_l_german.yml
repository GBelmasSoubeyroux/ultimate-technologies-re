  ULT_ADMISCE_ARMOR_U:0 "Quantenpanzerung Null zulassen"
  ULT_ADMISCE_ARMOR_U_DESC:0 "Molekulare Manipulation platziert jedes Teilchen, aus dem die Panzerung besteht, genau dort, wo es sein muss. Nichts im Universum ist stärker als dieses Material."
