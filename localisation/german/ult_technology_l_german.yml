  ULT_ADMISCE_ARMOR:0 "Quantenpanzerung einführen"
  ULT_ADMISCE_ARMOR_DESC:0 "Atomare Manipulation platziert jedes Teilchen, aus dem die Panzerung besteht, genau dort, wo es sein muss. Nichts im Universum ist stärker als dieses Material."
  SMALL_ULT_ADMISCE_ARMOR:0 "Kleine Admisce Panzerung"
  MEDIUM_ULT_ADMISCE_ARMOR:0 "Mittlere Admisce-Panzerung"
  LARGE_ULT_ADMISCE_ARMOR:0 "Große Admisce-Panzerung"
  ULT_BLINK_DRIVE:0 "Blinzelantrieb"
  ULT_BLINK_DRIVE_DESC:0 "Durch die Verzerrung von Zeit und Raum bis hin zur Erzeugung einer winzigen Singularität wird ein Spalt geöffnet, der das Schiff im Handumdrehen an einen entfernten Punkt im Universum bringt."
  CORVETTE_ULT_DARK_ENERGY_REACTOR:0 "Reaktor für dunkle Energie"
  CORVETTE_ULT_DARK_ENERGY_REACTOR_DESC:0 "Dieselbe Kraft, die die Expansion des Universums antreibt, treibt nun auch unsere Schiffe an. Die endlose Leere des Raums ist kein Hindernis mehr."
  DESTROYER_ULT_DARK_ENERGY_REACTOR:0 "Reaktor für dunkle Energie"
