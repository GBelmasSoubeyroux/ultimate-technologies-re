  building_ult_datacore:0 "Neuraler Uplink‑Datenkern"
  building_ult_datacore_desc:0 "Ein zentrales Nexus für alle planetaren Gehirn‑Drohnen, das die Forschungseffizienz massiv steigert."
  building_ult_dark_energy_grid:0 "Dunkelenergie‑Netz"
  building_ult_dark_energy_grid_desc:0 "Zusätzlicher Dunkelenergie‑Generator, der sich in das planetare Dunkelenergie‑Stromnetz integrieren lässt."
  building_ult_dark_energy_nexus:0 "Dunkelenergie‑Feldknoten"
  building_ult_dark_energy_nexus_desc:0 "Durch Modulation des lokalen Dunkelenergiefeldes um den Planeten kann dieses Gebäude die Effizienz aller Kraftwerke erheblich steigern."
  building_ult_gaia_shield:0 "Gaia‑Schild"
  building_ult_gaia_shield_desc:0 "Ein mächtiger Schild, der den Planeten selbst vor den größten Gefahren schützt. Dieses Wunder erzeugt zudem eine besondere Welle, die Herzen und Geist beruhigt, und die physikalischen wie technischen Phänomene, die es offenbart, bieten unseren besten Köpfen unendliche Forschungsmöglichkeiten."
  ult_gaia_shield_effect_desc:0 "Gaia‑Schilde können per Entscheidung aktiviert werden, um Orbitalbombardements zu verhindern."
  building_ult_edenization:0 "Edenisierung"
  building_ult_edenization_desc:0 "Der Bau eines Paradieses, in dem zahlreiche Spezies aus dem gesamten Kosmos in Harmonie existieren können. Was einst jenseits unserer kühnsten Träume lag, wird durch unsere Beharrlichkeit zur Realität."
  building_ult_commercial_center:0 "Interstellares Handelszentrum"
  building_ult_commercial_center_desc:0 "Ein gewaltiger Handelskomplex, der enorme Mengen interstellarer Geschäfte aufnehmen kann. Zudem ist er ein hervorragender Ort zum Einkaufen und zur Erholung."
  building_ult_ecological_station:0 "Biosphären‑Anreicherungsanlage"
  building_ult_ecological_station_desc:0 "Ein Team von Ökologen arbeitet rund um die Uhr, um sicherzustellen, dass das Ökosystem des Planeten exakt nach unseren Vorstellungen funktioniert, sodass gesellschaftliche Forschung trotz ständiger Veränderungen fortgeführt werden kann."
  building_ult_nano_garden_hub:0 "Nanogarten‑Zentrum"
  building_ult_nano_garden_hub_desc:0 "Zentrale Kommandostation zur Koordination nanoskaliger Agrardrohnen. Maximiert Ernteerträge, steigert die Biomasseeffizienz und erhält ein perfektes ökologisches Gleichgewicht."
  building_ult_planetary_terminal:0 "Planetarnetz für Transport"
  building_ult_planetary_terminal_desc:0 "Raumhäfen sind ein notwendiger Bestandteil interstellarer Bewegung, doch es wird immer boden‑ und luftgestützte Infrastruktur benötigen, um Handel und Produktion reibungslos aufrechtzuerhalten."
  building_ult_gestalt_terminal:0 "Planetarnetz für Transport"
  building_ult_gestalt_terminal_desc:0 "Raumhäfen sind ein notwendiger Bestandteil interstellarer Bewegung, doch es wird immer boden‑ und luftgestützte Infrastruktur benötigen, um Produktion und Transport reibungslos aufrechtzuerhalten."
  building_ult_intelligent_lab:0 "Intelligentes Labor"
  building_ult_intelligent_lab_desc:0 "Künstliche Intelligenz steuert über 95% dieses gewaltigen Forschungskomplexes und bietet eine hervorragende Forschungsumgebung für zahlreiche Wissenschaftler, die gleichzeitig unterschiedlichste Projekte durchführen."
  building_ult_recycling_network:0 "Atomarer Recycler"
  building_ult_recycling_network_desc:0 "Materie auf atomarer Ebene zu manipulieren bedeutet, dass alles in alles recycelt werden kann. Dieser Planet wird exakt null Abfall produzieren."
  building_ult_mining_drone_factory:0 "Bergbaudrohnen‑Assembler"
  building_ult_mining_drone_factory_desc:0 "Hier werden zusätzliche Bergbaudrohnen montiert, die sich der autonomen Arbeitskraft des Planeten anschließen."
  building_ult_library:0 "Die Große Bibliothek"
  building_ult_library_desc:0 "Das gesammelte Wissen unseres Imperiums liegt in diesem Gebäude. Es bietet uns vielfältige Perspektiven, um die Geheimnisse des Universums zu entschlüsseln."
  building_ult_maintenance_center:0 "Mega‑Wartungszentrum"
  building_ult_maintenance_center_desc:0 "Mega‑Wartungszentren können Milliarden von Drohnen aufnehmen und automatische Wartungsdienste bereitstellen."
  building_ult_slave_complex:0 "Mega‑Sklavenkomplex"
  building_ult_slave_complex_desc:0 "Mega‑Sklavenkomplexe sind riesige und nachhaltige Arbeitsstätten, die es Sklaven ermöglichen, effizient und reibungslos zu arbeiten."
  building_ult_industrial_atomic_assembler:0 "Industrieller Atom‑Assembler"
  building_ult_industrial_atomic_assembler_desc:0 "3D‑Druck im atomaren Maßstab eliminiert nicht nur den Bedarf an Spezialmaschinen, sondern ist auch extrem sicher und effizient. Durch die Industrialisierung dieser Technologie können wir große Mengen an Legierungen mit minimalem Abfall und ohne Verschmutzung herstellen."
  building_ult_civilian_atomic_assembler:0 "Ziviler Atom‑Assembler"
  building_ult_civilian_atomic_assembler_desc:0 "3D‑Druck im atomaren Maßstab eliminiert den Bedarf an Spezialmaschinen. Ein einziger Fertiger kann alles in Echtzeit produzieren."
  building_ult_dark_matter_collector:0 "Dunkelmaterie‑Kollektor"
  building_ult_dark_matter_collector_desc:0 "Angesichts der mysteriösen Natur der Dunkelmaterie wäre ihre Synthese ein ineffizienter Prozess. Daher sind Maschinen, die Dunkelmaterie über verschiedene Dimensionen extrahieren können, eine ausgezeichnete Wahl."
  building_ult_exotic_gases_synthesizer:0 "Exotische‑Gase‑Synthesizer"
  building_ult_exotic_gases_synthesizer_desc:0 "Durch das Ausreizen unserer atomaren Manipulationstechnologien können diese Maschinen exotische Gase automatisch synthetisieren."
  building_ult_volatile_motes_synthesizer:0 "Flüchtige‑Partikel‑Synthesizer"
  building_ult_volatile_motes_synthesizer_desc:0 "Durch das Ausreizen unserer atomaren Manipulationstechnologien können diese Maschinen flüchtige Partikel automatisch synthetisieren."
  building_ult_living_metal_synthesizer:0 "Lebendmetall‑Synthesizer"
  building_ult_living_metal_synthesizer_desc:0 "Durch das Ausreizen unserer atomaren Manipulationstechnologien können diese Maschinen Lebendmetall automatisch synthetisieren."
  building_ult_rare_crystals_synthesizer:0 "Seltene‑Kristalle‑Synthesizer"
  building_ult_rare_crystals_synthesizer_desc:0 "Durch das Ausreizen unserer atomaren Manipulationstechnologien können diese Maschinen seltene Kristalle automatisch synthetisieren."
  building_ult_nanites_synthesizer:0 "Naniten‑Synthesizer"
  building_ult_nanites_synthesizer_desc:0 "Durch das Ausreizen unserer atomaren Manipulationstechnologien können diese Maschinen Naniten automatisch synthetisieren."
  building_ult_zro_synthesizer:0 "Zro‑Synthesizer"
  building_ult_zro_synthesizer_desc:0 "Durch das Ausreizen unserer atomaren Manipulationstechnologien können diese Maschinen Zro automatisch synthetisieren."
  building_ult_ultimate_fortress:0 "Ultimative Festung"
  building_ult_ultimate_fortress_desc:0 "Ein gewaltiges Festungsnetzwerk, das unsere modernsten Technologien nutzt und in der Lage ist, die Verteidigung eines gesamten Planeten zu tragen."
  ult_ultimate_fortress_army_effect_desc:0 "Sobald die Ultimative Festung errichtet wurde, werden die £defense_army£ §YVerteidigungsarmeen§! dieses Planeten automatisch in das £defense_army£ §YUltimative Planetare Verteidigungssystem§! umgewandelt."
  building_ult_library_effect:0 "Produziert £unity£§G5§! für jeden §YAufstiegsvorteil§!, den unser Imperium erworben hat."
  building_ult_diplomacy_intelligence:0 "Amt für Interstellare Geheimdienste und Diplomatie"
  building_ult_diplomacy_intelligence_desc:0 "Diese komplexe Einrichtung ist unser nationales Zentrum für interstellare Geheimdienste und Außenpolitik. Sie nutzt unsere fortschrittlichsten Technologien und besten Agenten, um uns in diesem dunklen Universum eine hellere Zukunft zu sichern."

  building_ult_dark_energy_nexus_effect_desc:0 "Jedes §Y$district_ult_dark_energy_power_center$§! auf dem Planeten bietet §G+1§! £job_ult_dark_energy_field_operator£ §Y$job_ult_dark_energy_field_operator$§!-Stelle"
  building_ult_mining_network_effect_desc:0 "Jedes §Y$district_ult_automatic_mining_zone$§! auf dem Planeten bietet §G+1§! £job_ult_mining_drone_operator£ §Y$job_ult_mining_drone_operator$§!-Stelle"

  sm_ult_fleet_dock:0 "Unendliche Flottenwerft"
  sm_ult_fleet_dock_desc:0 "Das Infinity‑Raumdock nutzt unsere modernsten Tiefraumtechnologien. Es verfügt über mehrere gleichzeitig arbeitende Docks und kann eine gesamte Flotte für Wartung und Andocken aufnehmen. Seine weitläufigen Bereiche und Freizeiteinrichtungen bieten unserem Marinepersonal einen komfortablen Erholungsort."
  sm_ult_starfleet_academy:0 "Super‑Zitadellenkomplex"
  sm_ult_starfleet_academy_desc:0 "Der Super‑Zitadellenkomplex ist ein wahres Wunder der Ingenieurskunst. Er vereint Flottenakademie, Handelshubs, Kunstanlagen, zivile Raumhäfen, Unterhaltungszonen und Wissenschaftsakademie in einem einzigen, optimal betriebenen Megakomplex."
  sm_ult_matrix_defence:0 "Ultimative Verteidigungsmatrix"
  sm_ult_matrix_defence_desc:0 "Die Ultimative Verteidigungsmatrix erschafft ein undurchdringliches Verteidigungsnetzwerk und überwacht jede noch so kleine Bewegung in enormer Reichweite. Darüber hinaus ermöglichen ihre großflächigen automatisierten Verteidigungsanwendungen, dass wir mehr Arbeitskraft dem Flottenbau widmen können."
  sm_ult_deepspace_production:0 "Tiefraum‑Bergbauabteilung"
  sm_ult_deepspace_production_desc:0 "Die Tiefraum‑Bergbauabteilung ist das Super‑Nexus der interstellaren Bergbauindustrie. Mit fortschrittlicher atomarer Manipulationstechnologie kann diese Anlage enorme Mengen an Mineralien in neutronenentartete Zustände komprimieren oder direkt in Legierungen umwandeln. Diese spektakuläre Raumstation ist zudem mit großskaligen Dunkelenergie‑Kernen und einem Nanogarten ausgestattet und liefert beträchtliche Ressourcen."
  sm_ring_ult_super_complex:0 "Super‑Orbitalring‑Komplex"
  sm_ring_ult_super_complex_desc:0 "Dieser geniale Megakomplex vereint Weltraumaufzüge, Orbitalschiffswerften, Flottenakademie, Handelshubs und zivile Transportanlagen in einer einzigen Struktur."
  sm_ring_ult_matrix_defence:0 "Ultimative Orbitale Verteidigungsmatrix"
  sm_ring_ult_matrix_defence_desc:0 "Die Ultimative Verteidigungsmatrix erschafft ein undurchdringliches Verteidigungsnetzwerk. Ihre großflächigen automatisierten Verteidigungsanwendungen ermöglichen es uns, mehr Arbeitskraft dem Flottenbau zu widmen."


  
