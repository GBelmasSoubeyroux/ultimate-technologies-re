  job_ult_dark_energy_field_operator:0 "Dunkelenergie‑Feldoperator"
  job_ult_dark_energy_field_operator_plural:0 "Dunkelenergie‑Feldoperatoren"
  job_ult_dark_energy_field_operator_desc:0 "Dank unserer Automatisierungstechnologien und Sicherheitsprotokolle ist der Beruf des Dunkelenergie‑Feldoperators möglicherweise der einfachste im ganzen Land – man muss lediglich einige Daten überprüfen, um sicherzustellen, dass alle Geräte perfekt funktionieren."
  mod_job_ult_dark_energy_field_operator_add:0 "Stelle: Dunkelenergie‑Feldoperator"
  job_ult_dark_energy_field_operator_effect_desc:0 "£job_ult_dark_energy_field_operator£ $job_ult_dark_energy_field_operator_plural$ produzieren £energy£ §Y$energy$§!"
    
  job_ult_mining_drone_operator:0 "Bergbaudrohnen‑Programmierer"
  job_ult_mining_drone_operator_plural:0 "Bergbaudrohnen‑Programmierer"
  job_ult_mining_drone_operator_desc:0 "Bergbaudrohnen‑Programmierer entwerfen die Arbeitsrouten der Drohnen und programmieren sie so, dass sie stets mit maximaler Effizienz abbauen."
  mod_job_ult_mining_drone_operator_add:0 "Stelle: Bergbaudrohnen‑Programmierer"
  job_ult_mining_drone_operator_effect_desc:0 "£job_ult_mining_drone_operator£ $job_ult_mining_drone_operator_plural$ produzieren £minerals£ §Y$minerals$§!"
    
  job_ult_nutritionist:0 "Ernährungswissenschaftler"
  job_ult_nutritionist_plural:0 "Ernährungswissenschaftler"
  job_ult_nutritionist_desc:0 "Ernährungswissenschaftler verwalten den Nanogarten und nutzen die nährstoffreiche Biomasse, um hochwertige Lebensmittel und Konsumgüter zu synthetisieren."
  mod_job_ult_nutritionist_add:0 "Stelle: Ernährungswissenschaftler"
  job_ult_nutritionist_effect_desc:0 "£job_ult_nutritionist£ $job_ult_nutritionist_plural$ produzieren £food£ §Y$food$§! und £consumer_goods£ §Y$consumer_goods$§!"
    
  job_ult_atomic_assembler:0 "Atomarer Assemblierer"
  job_ult_atomic_assembler_plural:0 "Atomare Assemblierer"
  job_ult_atomic_assembler_desc:0 "Atomare Assemblierer sind spezialisierte Materialingenieure. Sie justieren die Parameter der Geräte, um sicherzustellen, dass jede Legierung perfekte Qualität erreicht."
  mod_job_ult_atomic_assembler_add:0 "Stelle: Atomarer Assemblierer"
  job_ult_atomic_assembler_effect_desc:0 "£job_ult_atomic_assembler£ $job_ult_atomic_assembler_plural$ verwandeln £minerals£ §Y$minerals$§! in £alloys£ §Y$alloys$§!"
    
  job_ult_ecologist:0 "Ökologe"
  job_ult_ecologist_plural:0 "Ökologen"
  job_ult_ecologist_desc:0 "Ökologen sind die Hüter des Planeten. Sie erforschen Ökosystem und Biosphäre und nutzen fortschrittliche Technologien, um sie in eine bessere Form zu bringen."
  mod_job_ult_ecologist_add:0 "Stelle: Ökologe"
  job_ult_ecologist_effect_desc:0 "£job_ult_ecologist£ $job_ult_ecologist_plural$ produzieren £society£ §Y$society_research$§! und £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!"
    
  job_ult_product_designer:0 "Produktdesigner"
  job_ult_product_designer_plural:0 "Produktdesigner"
  job_ult_product_designer_desc:0 "Produktdesigner entwerfen nicht nur vielfältige Waren, sondern entwickeln auch umfangreiche Marketingstrategien und Werbekampagnen. Sie nehmen eine bedeutende Rolle bei der Beeinflussung populärer Trends ein."
  mod_job_ult_product_designer_add:0 "Stelle: Produktdesigner"
  job_ult_product_designer_effect_desc:0 "£job_ult_product_designer£ $job_ult_product_designer_plural$ produzieren £trade_value£ §Y$TRADE_VALUE$§! und £unity£ §Y$unity$§!"

  
  
