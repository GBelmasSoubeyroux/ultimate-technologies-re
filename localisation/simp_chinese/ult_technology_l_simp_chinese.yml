  ULT_GLUON_PHASE_TORPEDOE:0 "胶子相位雷"
  ULT_GLUON_PHASE_TORPEDOE_DESC:0 "除了相位科技赋予的护盾穿透特性，胶子鱼雷爆炸所释放的巨大威力甚至可以撕裂质子和中子。"
  ULT_DARK_ENERGY_PHASE_TORPEDO:0 "暗能量鱼雷"
  ULT_DARK_ENERGY_PHASE_TORPEDO_DESC:0 "使用装载有暗能量弹头的相位变换鱼雷，我们可以绕过护盾阻拦将暗能量倾泻在敌舰船体上造成巨大破坏。"
  ULT_STAR_KILLER_ENERGY:0 "终极能量弹头:日食"
  ULT_STAR_KILLER_ENERGY_DESC:0 "日式计划的产物，是我们目前所研究出的最具破坏力的武器。其弹头蕴含的能量足以点亮一颗恒星。"
  ULT_STAR_KILLER_KINETIC:0 "终极动能弹头:日食"
  ULT_STAR_KILLER_KINETIC_DESC:0 "日式计划的产物，是我们目前所研究出的最具破坏力的武器。其弹头本身就是一个超光速相位变换设备，可在虚空中加速，并在出现时就具备难以估量的动能。"
  ULT_NETWORKED_DRONES_HANGAR_ENERGY:0 "能量型蜂群无人机"
  ULT_NETWORKED_DRONES_HANGAR_ENERGY_DESC:0 "利用AI网络操控的无人机，具有数量优势并能够快速补充，作战时能如同风暴一样席卷敌人。"
  ULT_NETWORKED_DRONES_HANGAR_KINETIC:0 "动能型蜂群无人机"
  ULT_NETWORKED_DRONES_HANGAR_KINETIC_DESC:0 "利用AI网络操控的无人机，具有数量优势并能够快速补充，作战时能如同风暴一样席卷敌人。"
  ULT_QUANTUM_FIRE_CONTROL:0 "量子火控系统"
  ULT_QUANTUM_FIRE_CONTROL_DESC:0 "使用先进的量子计算机与量子场操控来强化我们武器的开火效率。"
  ULT_TRIDENT_TITAN_ENERGY:0 "泰坦能量三叉戟"
  ULT_TRIDENT_TITAN_ENERGY_DESC:0 "泰坦三叉戟是我们武器技术的终极飞跃，每一次开火都是毁灭性能量的倾泻。其难以估量的能量甚至能击穿现实，使寻常物理法则都失去效果。"
  ULT_TRIDENT_TITAN_KINETIC:0 "泰坦动能三叉戟"
  ULT_TRIDENT_TITAN_KINETIC_DESC:0 "泰坦三叉戟是我们武器技术的终极飞跃，每一次开火都是毁灭性能量的倾泻。其难以估量的能量甚至能击穿现实，使寻常物理法则都失去效果。"
  ULT_TRIDENT_ION_ENERGY:0 "守护者能量三叉戟"
  ULT_TRIDENT_ION_ENERGY_DESC:0 "守护者三叉戟比泰坦三叉戟更强力，但其巨大威力的代价是无法移动，只能作为静态防御安装在离子加农炮上。"
  ULT_TRIDENT_ION_KINETIC:0 "守护者动能三叉戟"
  ULT_TRIDENT_ION_KINETIC_DESC:0 "守护者三叉戟比泰坦三叉戟更强力，但其巨大威力的代价是无法移动，只能作为静态防御安装在离子加农炮上。"
  ULT_GLUON_CANNON:0 "胶子碎裂炮"
  ULT_GLUON_CANNON_DESC:0 "胶子碎裂炮命中船体时产生的亚空间碎片足以撕裂任何形式的防御，其被加速得越快，威力越大，甚至连中子装甲都不堪一击。"
  ULT_TRANSPHASIC_PLUSE:0 "超相位脉冲"
  ULT_TRANSPHASIC_PLUSE_DESC:0 "超相位脉冲命中船体时能解离周围空间，形成毁伤力极强的泯灭效应，常规装甲和船体完全无法承受。"
