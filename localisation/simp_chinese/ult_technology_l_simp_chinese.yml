  ULT_VIRTUAL_PARTICLE_CANNON_U_DESC:0 "诡异的虚粒子可以不与任何物质发生作用，由于这个特性，虚粒子武器能无视护盾和装甲直接对船体造成毁灭性打击。当然，偶尔也会出现丝毫发生作用的情况，运气总是如同虚粒子一样令人捉摸不定。"
  SMALL_ULT_VIRTUAL_PARTICLE_CANNON_U:0 "小型零系-虚粒子加农炮"
  MEDIUM_ULT_VIRTUAL_PARTICLE_CANNON_U:0 "中型零系-虚粒子加农炮"
  LARGE_ULT_VIRTUAL_PARTICLE_CANNON_U:0 "大型零系-虚粒子加农炮"
  ULT_VIRTUAL_PARTICLE_TORRENT_U:0 "零系-虚粒子洪流"
  ULT_VIRTUAL_PARTICLE_TORRENT_U_DESC:0 "这些被相位加速并施以负向能荷的虚粒子流能形成小范围的空间畸变，甚至能颠覆物理法则，轻松撕碎装甲和船体。"
  ULT_PHASE_RAILGUN_U:0 "零系-相位轨道炮"
  ULT_PHASE_RAILGUN_U_DESC:0 "利用相位技术在短时间内将炮弹加速到具备毁灭性的破坏力。"
  SMALL_ULT_PHASE_RAILGUN_U:0 "小型零系-相位轨道炮"
  MEDIUM_ULT_PHASE_RAILGUN_U:0 "中型零系-相位轨道炮"
  LARGE_ULT_PHASE_RAILGUN_U:0 "大型零系-相位轨道炮"
  ULT_SINGULARITY_ACCELERATOR_U:0 "零系-奇点加速器"
  ULT_SINGULARITY_ACCELERATOR_U_DESC:0 "利用相位科技极限加速一小搓物质形成一个人工奇点，其蕴含的力量足以瞬间抹除一艘大型战舰。"
  ULT_VOID_PHASE_MISSILE_ENERGY_U:0 "零系-能量型伊南里司相位导弹"
  ULT_VOID_PHASE_MISSILE_ENERGY_U_DESC:0 "融合了最新的相位变换科技，搭载能量弹头的伊南里司导弹能从虚空中打击敌方。"
  ULT_VOID_PHASE_MISSILE_KINETIC_U:0 "零系-动能型伊南里司相位导弹"
  ULT_VOID_PHASE_MISSILE_KINETIC_U_DESC:0 "融合了最新的相位变换科技，搭载相位加速器伊南里司导弹能在虚空中积聚力量打击敌方。"
  ULT_GLUON_PHASE_TORPEDOE_U:0 "零系-胶子相位雷"
  ULT_GLUON_PHASE_TORPEDOE_U_DESC:0 "除了相位科技赋予的护盾穿透特性，胶子鱼雷爆炸所释放的巨大威力甚至可以撕裂质子和中子。"
  ULT_DARK_ENERGY_PHASE_TORPEDO_U:0 "零系-暗能量鱼雷"
  ULT_DARK_ENERGY_PHASE_TORPEDO_U_DESC:0 "使用装载有暗能量弹头的相位变换鱼雷，我们可以绕过护盾阻拦将暗能量倾泻在敌舰船体上造成巨大破坏。"
  ULT_STAR_KILLER_ENERGY_U:0 "零系-终极能量弹头:日食"
  ULT_STAR_KILLER_ENERGY_U_DESC:0 "又名星球毁灭者，是我们目前所研究出的最具破坏力的武器。其弹头蕴含的能量足以点亮一颗恒星。"
  ULT_STAR_KILLER_KINETIC_U:0 "零系-终极动能弹头:日食"
  ULT_STAR_KILLER_KINETIC_U_DESC:0 "又名星球毁灭者，是我们目前所研究出的最具破坏力的武器。其弹头本身就是一个超光速相位变换设备，可在虚空中加速，并在出现时就具备难以估量的动能。"
  ULT_NETWORKED_DRONES_HANGAR_ENERGY_U:0 "零系-能量型蜂群无人机"
  ULT_NETWORKED_DRONES_HANGAR_ENERGY_U_DESC:0 "利用AI网络操控的无人机，具有数量优势并能够快速补充，作战时能如同风暴一样席卷敌人。"
  ULT_NETWORKED_DRONES_HANGAR_KINETIC_U:0 "零系-动能型蜂群无人机"
  ULT_NETWORKED_DRONES_HANGAR_KINETIC_U_DESC:0 "利用AI网络操控的无人机，具有数量优势并能够快速补充，作战时能如同风暴一样席卷敌人。"
  ULT_TRIDENT_TITAN_ENERGY_U:0 "零系-泰坦能量三叉戟"
  ULT_TRIDENT_TITAN_ENERGY_U_DESC:0 "泰坦三叉戟是我们武器技术的终极飞跃，每一次开火都是毁灭性能量的倾泻。其难以估量的能量甚至能击穿现实，使寻常物理法则都失去效果。"
  ULT_TRIDENT_TITAN_KINETIC_U:0 "零系-泰坦动能三叉戟"
  ULT_TRIDENT_TITAN_KINETIC_U_DESC:0 "泰坦三叉戟是我们武器技术的终极飞跃，每一次开火都是毁灭性能量的倾泻。其难以估量的能量甚至能击穿现实，使寻常物理法则都失去效果。"
  ULT_TRIDENT_ION_ENERGY_U:0 "零系-守护者能量三叉戟"
  ULT_TRIDENT_ION_ENERGY_U_DESC:0 "守护者三叉戟比泰坦三叉戟更强力，但其巨大威力的代价是无法移动，只能作为静态防御安装在离子加农炮上。"
  ULT_TRIDENT_ION_KINETIC_U:0 "零系-守护者动能三叉戟"
  ULT_TRIDENT_ION_KINETIC_U_DESC:0 "守护者三叉戟比泰坦三叉戟更强力，但其巨大威力的代价是无法移动，只能作为静态防御安装在离子加农炮上。"
  ULT_GLUON_CANNON_U:0 "零系-胶子碎裂炮"
  ULT_GLUON_CANNON_U_DESC:0 "胶子碎裂炮命中船体时产生的亚空间碎片足以撕裂任何形式的防御，其被加速得越快，威力越大，甚至连中子装甲都不堪一击。"
  ULT_TRANSPHASIC_PLUSE_U:0 "零系-超相位脉冲"
  ULT_TRANSPHASIC_PLUSE_U_DESC:0 "超相位脉冲命中船体时能解离周围空间，形成毁伤力极强的泯灭效应，常规装甲和船体完全无法承受。"
  SMALL_ULT_TRANSPHASIC_PLUSE_U:0 "小型零系-超相位脉冲"
  MEDIUM_ULT_TRANSPHASIC_PLUSE_U:0 "中型零系-超相位脉冲"
  LARGE_ULT_TRANSPHASIC_PLUSE_U:0 "大型零系-超相位脉冲"
  
  SWARM_ULT_COMBAT_COMPUTER_AI_U:0 "零系-智能作战枢纽(蜂群)"
  SWARM_ULT_COMBAT_COMPUTER_AI_U_DESC:0 "由强大的智能网络连接所有舰船，无论是群体协作还是单独行动都能进行高效作战。"
  PICKET_ULT_COMBAT_COMPUTER_AI_U:0 "零系-智能作战枢纽(突击)"
  PICKET_ULT_COMBAT_COMPUTER_AI_U_DESC:0 "由强大的智能网络连接所有舰船，无论是群体协作还是单独行动都能进行高效作战。"
  LINE_ULT_COMBAT_COMPUTER_AI_U:0 "零系-智能作战枢纽(中程火力)"
