  ult_temporary_settlement:0 "临时居住区"
  ult_temporary_settlement_desc:0 "由于大规模的行星改造，这些宜居的临时居住区现已向无家可归者开放。"
  ult_architecture_optimize:0 "基础设施优化"
  ult_architecture_optimize_desc:0 "通过应用高科技建筑结构来优化我们的世界，我们成功以格式塔方式构建了高效的基础设施系统，并能享受其带来的诸多益处。"
  ult_gaia_shield_activating:0 "盖亚护盾完全激活"
  ult_gaia_shield_activating_desc:0 "完全激活的盖亚护盾正保护我们免受巨大威胁。它能够承受强烈的轨道轰炸，为我们争取宝贵时间应对敌人。然而，它无法阻挡行星毁灭级武器。"
  ult_gaia_shield_recharging:0 "盖亚护盾充能中"
  ult_gaia_shield_recharging_desc:0 "盖亚护盾需要时间充能，以便再次释放复原波。"
  ult_organic_pop_assembly:0 "有机人口合成中"
  ult_organic_pop_assembly_desc:0 "纳米强化孵化器正被用于高效培育有机人口。（你可能需要克隆槽来开始组装。）"
  ult_robot_pop_assembly:0 "机器人组装中"
  ult_robot_pop_assembly_desc:0 "原子打印与纳米技术正被用于自动组装机械部件以制造机器人人口。（你可能需要机器人组装厂来开始组装。）"
  col_ult_utopia:0 "乌托邦世界"
  col_ult_utopia_desc:0 "乌托邦世界是真正的天堂，允许无数物种共存与繁荣。生活在这里的人们享受高品质生活与无可估量的幸福。"
  col_ult_utopia_trade:0 "乌托邦世界（贸易导向）"
  col_ult_utopia_trade_desc:0 "乌托邦世界是真正的天堂，允许无数物种共存与繁荣。生活在这里的人们享受高品质生活与无可估量的幸福。"
  col_ult_utopia_alloy:0 "乌托邦世界（合金合成）"
  col_ult_utopia_alloy_desc:0 "乌托邦世界是真正的天堂，允许无数物种共存与繁荣。生活在这里的人们享受高品质生活与无可估量的幸福。"
  col_ult_utopia_consumer_goods:0 "乌托邦世界（消费品制造）"
  col_ult_utopia_consumer_goods_desc:0 "乌托邦世界是真正的天堂，允许无数物种共存与繁荣。生活在这里的人们享受高品质生活与无可估量的幸福。"
