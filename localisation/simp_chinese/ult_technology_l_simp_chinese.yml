  district_ult_dark_energy_power_center:0 "暗能量动力中心"
  district_ult_dark_energy_power_center_desc:0 "暗能量在宇宙尺度上推动膨胀，是存在中最强大的能量来源。如今通过暗能量场操控技术，我们能够以简单且无害的方式利用它为帝国提供能源。"
  district_ult_automatic_mining_zone:0 "自动采矿区"
