  building_ult_datacore:0 "神经上行数据核心"
  building_ult_datacore_desc:0 "所有行星脑机无人机的中央枢纽，大幅提升科研效率。"
  building_ult_dark_energy_grid:0 "暗能量电网"
  building_ult_dark_energy_grid_desc:0 "可整合进行星暗能量电网的额外暗能量发电装置。"
  building_ult_dark_energy_nexus:0 "暗能量场节点"
  building_ult_dark_energy_nexus_desc:0 "通过调制行星周围的局部暗能量场，此建筑可显著提升所有发电设施的效率。"
  building_ult_gaia_shield:0 "盖亚之盾"
  building_ult_gaia_shield_desc:0 "一座足以抵御最强威胁的强大神盾，同时释放能安抚人心的特殊波动。其展现的物理与工程奇迹让我们的顶尖学者得以持续进行实验。"
  ult_gaia_shield_effect_desc:0 "盖亚之盾可通过决议激活，以阻止轨道轰炸。"
  building_ult_edenization:0 "伊甸化工程"
  building_ult_edenization_desc:0 "为来自宇宙各地的多种族打造一个和谐共存的天堂。曾经遥不可及的梦想如今因我们的坚持而成为现实。"
  building_ult_commercial_center:0 "星际商业中心"
  building_ult_commercial_center_desc:0 "一座能够容纳大量星际商业活动的庞大商业综合体，同时也是购物与娱乐的绝佳场所。"
  building_ult_ecological_station:0 "生物圈增益设施"
  building_ult_ecological_station_desc:0 "一支生态学家团队昼夜不停地工作，确保行星生态系统完全按照我们的意愿运转，使社会研究能在不断变化的环境中持续进行。"
  building_ult_nano_garden_hub:0 "纳米花园中心"
  building_ult_nano_garden_hub_desc:0 "协调纳米级农业无人机的中央指挥枢纽。最大化作物产量，提高生物质效率，并维持完美的生态平衡。"
  building_ult_planetary_terminal:0 "行星运输网络"
  building_ult_planetary_terminal_desc:0 "太空港是星际航行的必要组成部分，但仍需要空地基础设施来确保贸易与生产顺畅运行。"
  building_ult_gestalt_terminal:0 "行星运输网络"
  building_ult_gestalt_terminal_desc:0 "太空港是星际航行的必要组成部分，但仍需要空地基础设施来确保生产与运输顺畅运行。"
  building_ult_intelligent_lab:0 "智能实验室"
  building_ult_intelligent_lab_desc:0 "人工智能负责此庞大研究综合体超过 95% 的运作，为众多研究人员同时开展不同研究提供卓越环境。"
  building_ult_recycling_network:0 "原子回收器"
  building_ult_recycling_network_desc:0 "在原子尺度操控物质意味着任何东西都能被回收成任何东西。此行星将实现真正的零废弃。"
  building_ult_mining_drone_factory:0 "采矿无人机装配厂"
  building_ult_mining_drone_factory_desc:0 "在这里，额外的采矿无人机被组装并加入行星的自主劳动力队伍。"
  building_ult_library:0 "大图书馆"
  building_ult_library_desc:0 "帝国累积的知识尽藏于此。它为我们提供多角度视野，以揭开宇宙的奥秘。"
  building_ult_maintenance_center:0 "巨型维护中心"
  building_ult_maintenance_center_desc:0 "巨型维护中心能够容纳数十亿无人机，并提供自动化维护服务。"
  building_ult_slave_complex:0 "巨型奴隶综合体"
  building_ult_slave_complex_desc:0 "巨型奴隶综合体是庞大且可持续的工作场所，使奴隶能够高效且顺畅地劳动。"
  building_ult_industrial_atomic_assembler:0 "工业原子装配器"
  building_ult_industrial_atomic_assembler_desc:0 "原子尺度的 3D 打印不仅消除了对专用机器的需求，还极其安全高效。通过将此技术工业化，我们能以最小浪费和零污染生产大量合金。"
  building_ult_civilian_atomic_assembler:0 "民用原子装配器"
  building_ult_civilian_atomic_assembler_desc:0 "原子尺度的 3D 打印消除了对专用机器的需求。单一装配器即可实时生产任何所需物品。"
  building_ult_dark_matter_collector:0 "暗物质采集器"
  building_ult_dark_matter_collector_desc:0 "考虑到暗物质的神秘特性，合成它将是极低效的过程。因此，能够跨维度提取暗物质的机器是极佳的选择。"
  building_ult_exotic_gases_synthesizer:0 "异星天然气合成器"
  building_ult_exotic_gases_synthesizer_desc:0 "将原子操控技术推至极限后，这些机器能够自动合成异星天然气。"
  building_ult_volatile_motes_synthesizer:0 "易爆微粒合成器"
  building_ult_volatile_motes_synthesizer_desc:0 "将原子操控技术推至极限后，这些机器能够自动合成易爆微粒。"
  building_ult_living_metal_synthesizer:0 "活体金属合成器"
  building_ult_living_metal_synthesizer_desc:0 "将原子操控技术推至极限后，这些机器能够自动合成活体金属。"
  building_ult_rare_crystals_synthesizer:0 "稀有水晶合成器"
  building_ult_rare_crystals_synthesizer_desc:0 "将原子操控技术推至极限后，这些机器能够自动合成稀有水晶。"
  building_ult_nanites_synthesizer:0 "纳米机器人合成器"
  building_ult_nanites_synthesizer_desc:0 "将原子操控技术推至极限后，这些机器能够自动合成纳米机器人。"
  building_ult_zro_synthesizer:0 "泽洛合成器"
  building_ult_zro_synthesizer_desc:0 "将原子操控技术推至极限后，这些机器能够自动合成泽洛。"
  building_ult_ultimate_fortress:0 "终极堡垒"
  building_ult_ultimate_fortress_desc:0 "一座应用我们最尖端技术的庞大堡垒网络，能够承担整颗行星的防御。"
  ult_ultimate_fortress_army_effect_desc:0 "当终极堡垒建成后，此行星上的 £defense_army£ §Y防御部队§! 将自动转化为 £defense_army£ §Y终极行星防御系统§!。"
  building_ult_library_effect:0 "每个帝国已获得的§Y飞升天赋§!产出 £unity£§G5§!。"
  building_ult_diplomacy_intelligence:0 "星际情报与外交局"
  building_ult_diplomacy_intelligence_desc:0 "此复杂设施是我们国家的星际情报与外交枢纽。它运用最先进的技术与最优秀的特工，确保我们在这片黑暗宇宙中拥有更光明的未来。"
  
  building_ult_dark_energy_nexus_effect_desc:0 "每个行星上的 §Y$district_ult_dark_energy_power_center$§! 提供 §G+1§! £job_ult_dark_energy_field_operator£ §Y$job_ult_dark_energy_field_operator$§! 岗位"
  building_ult_mining_network_effect_desc:0 "每个行星上的 §Y$district_ult_automatic_mining_zone$§! 提供 §G+1§! £job_ult_mining_drone_operator£ §Y$job_ult_mining_drone_operator$§! 岗位"

  sm_ult_fleet_dock:0 "无限船坞"
  sm_ult_fleet_dock_desc:0 "无限太空船坞采用我们最尖端的深空技术，配备可同时运作的多重船坞，并能容纳整支舰队进行停泊与维护。其宽阔空间与休闲设施为海军人员提供舒适的休憩场所。"
  sm_ult_starfleet_academy:0 "超级星堡综合体"
  sm_ult_starfleet_academy_desc:0 "超级星堡综合体是一项真正的工程奇迹，它将舰队学院、贸易枢纽、艺术设施、民用太空港、娱乐区与科学学院无缝整合，并以最佳效率运作。"
  sm_ult_matrix_defence:0 "终极防御矩阵"
  sm_ult_matrix_defence_desc:0 "终极防御矩阵构建一道无法穿透的防御网络，并在极远距离监测每一丝细微动向。此外，其大规模自动化防御系统让我们能将更多人力投入舰队建设。"
  sm_ult_deepspace_production:0 "深空资源开发部"
  sm_ult_deepspace_production_desc:0 "深空资源开发部是星际采矿业的超级枢纽。利用先进的原子操控技术，此设施可将大量矿物压缩至中子简并态储存，或直接转化为合金。该壮观的空间站还配备大型暗能量核心与纳米花园，提供可观的资源产出。"
  sm_ring_ult_super_complex:0 "超级轨道环综合体"
  sm_ring_ult_super_complex_desc:0 "这座巧妙的巨型综合体同时整合太空电梯、轨道船坞、舰队学院、贸易枢纽与民用运输设施。"
  sm_ring_ult_matrix_defence:0 "终极轨道防御矩阵"
  sm_ring_ult_matrix_defence_desc:0 "终极防御矩阵构建一道无法穿透的防御网络，其大规模自动化防御系统让我们能将更多人力投入舰队建设。"

 
