  ULT_VOID_PHASE_MISSILE_ENERGY:0 "能量型伊南里司相位导弹"
  ULT_VOID_PHASE_MISSILE_ENERGY_DESC:0 "融合了最新的相位变换科技，搭载能量弹头的伊南里司导弹能从虚空中打击敌方。"
  ULT_VOID_PHASE_MISSILE_KINETIC:0 "动能型伊南里司相位导弹"
